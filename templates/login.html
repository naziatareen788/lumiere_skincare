{% extends 'base.html' %}
{% block content %}

<section class="auth-page">
    <div class="auth-box">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-sub">Sign in to your Lumière account</p>

        <form id="loginForm">
            <div class="contact-field">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="your@email.com">
            </div>
            <div class="contact-field">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>
            <button type="button" onclick="validateLogin()" class="btn-dark" style="width:100%;">Sign In</button>
        </form>

        <p class="auth-switch">Don't have an account? <a href="/register">Create one</a></p>
    </div>
</section>

<script>
function validateLogin() {
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    let valid = true;

    [email, password].forEach(function(field) {
        const existing = field.parentElement.querySelector('.form-alert');
        if (existing) existing.remove();
        field.style.borderColor = '#d8e8d0';
    });

    if (!email.value.trim()) {
        showError(email, 'Please enter your email address!');
        valid = false;
    }
    if (!password.value.trim()) {
        showError(password, 'Please enter your password!');
        valid = false;
    }

    if (valid) {
        alert('Login form is valid! (Backend not connected yet)');
    }
}

function showError(field, message) {
    const alert = document.createElement('div');
    alert.className = 'form-alert';
    alert.style.color = '#c0392b';
    alert.style.fontSize = '12px';
    alert.style.marginTop = '4px';
    alert.textContent = message;
    field.parentElement.appendChild(alert);
    field.style.borderColor = '#c0392b';
}
</script>

{% endblock %}
